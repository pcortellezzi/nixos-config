name: Build and Deploy NixOS

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'home/**'
      - 'hosts/**'
      - 'lib/**'
      - 'modules/**'
      - 'secrets/**'
  workflow_dispatch:
    inputs:
      host:
        description: 'Select host to deploy to (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - flip-cx5
          - ser5
          - vvb

jobs:
  # --- Job 1: Détermine la matrice de déploiement --- #
  setup:
    name: Setup Deployment Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.hosts }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event.inputs.host }}" == "all" || -z "${{ github.event.inputs.host }}" ]]; then
            echo 'hosts=["flip-cx5", "ser5", "vvb"]' >> $GITHUB_OUTPUT
          else
            echo 'hosts=["${{ github.event.inputs.host }}"]' >> $GITHUB_OUTPUT
          fi

  # --- Job 2: Déploie sur les hôtes déterminés par le Job 1 --- #
  deploy:
    name: Deploy to ${{ matrix.host }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            substituters = https://cache.nixos.org/ https://pcortellezzi.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= pcortellezzi.cachix.org-1:IL7g88BOsIf1AeFl37PclJtA/lLY6Auf3xtRh30M0fI=
            access-tokens = github.com=${{ secrets.PAT }}

      - name: Check flake validity
        run: nix flake check

      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:gh-nixos-deploy-runner

      - name: Install SSH Deploy Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_KEY }}
          name: id_ed25519_deploy
          known_hosts: 'just-a-placeholder'

      - name: Add SSH host key to known_hosts
        run: |
          HOST_KEY=$(nix eval --raw -f lib/ssh-host-keys.nix ${{ matrix.host }})
          mkdir -p ~/.ssh
          echo "${{ matrix.host }} $HOST_KEY" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Create SSH Config
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host ${{ matrix.host }}
            User deploy-user
            IdentityFile /home/runner/.ssh/id_ed25519_deploy
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Check host availability
        id: check_host
        run: |
          if nc -zvw1 ${{ matrix.host }} 22; then
            echo "Host ${{ matrix.host }} is reachable."
            echo "is_available=true" >> $GITHUB_OUTPUT
          else
            echo "Host ${{ matrix.host }} is not reachable. Skipping subsequent steps."
            echo "is_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger remote update
        if: steps.check_host.outputs.is_available == 'true'
        run: |
          echo "Triggering remote update on ${{ matrix.host }}..."
          ssh ${{ matrix.host }} "sudo systemctl start --no-block nixos-update-runner.service"

      - name: Wait for update to complete
        if: steps.check_host.outputs.is_available == 'true'
        run: |
          echo "Waiting for nixos-update-runner to finish on ${{ matrix.host }}..."
          MAX_WAIT=600
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            # SSH may fail temporarily if the switch restarts networking — retry silently
            # is-active doesn't need sudo, and returns non-zero for inactive/failed — capture output only
            STATE=$(ssh -o ConnectTimeout=10 -o ServerAliveInterval=5 -o ServerAliveCountMax=2 \
              ${{ matrix.host }} "systemctl is-active nixos-update-runner.service 2>/dev/null || true" 2>/dev/null || echo "unreachable")

            case "$STATE" in
              activating|active)
                echo "[$ELAPSED/${MAX_WAIT}s] Still running..."
                ;;
              inactive)
                echo "Update completed successfully."
                exit 0
                ;;
              failed)
                echo "::error::Remote update failed. Fetching logs..."
                ssh ${{ matrix.host }} "sudo journalctl -u nixos-update-runner.service -n 50 --no-pager"
                exit 1
                ;;
              unreachable)
                echo "[$ELAPSED/${MAX_WAIT}s] Host unreachable (switch may be restarting networking), retrying..."
                ;;
              *)
                echo "[$ELAPSED/${MAX_WAIT}s] Unexpected state: $STATE, retrying..."
                ;;
            esac
          done

          echo "::error::Timed out waiting for update after ${MAX_WAIT}s"
          ssh -o ConnectTimeout=10 ${{ matrix.host }} "sudo journalctl -u nixos-update-runner.service -n 50 --no-pager" 2>/dev/null || true
          exit 1
